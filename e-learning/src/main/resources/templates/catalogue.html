<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue - e-learn Fst</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/site.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="ux-body">
    <nav class="nav-header" id="navbar">
        <div class="container nav-inner">
            <a href="/" class="brand-link">
                <span class="brand-mark">EL</span>
                <span class="brand-name">e-learn Fst</span>
            </a>

            <ul class="nav-list">
                <li><a href="/" class="nav-link">Accueil</a></li>
                <li><a href="/catalogue" class="nav-link active">Catalogue</a></li>
                <li><a href="/progression" class="nav-link">My Learning</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a href="/admin" class="nav-link">Admin</a></li>
                <li sec:authorize="hasRole('FORMATEUR')"><a href="/manager" class="nav-link">Manager</a></li>
            </ul>

            <div class="nav-actions">
                <a href="/login" class="btn btn-primary" sec:authorize="!isAuthenticated()">Sign In</a>
                <form th:action="@{/logout}" method="post" class="nav-form" sec:authorize="isAuthenticated()">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-secondary">Déconnexion</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="catalogue-page container">
        <header class="catalogue-hero">
            <div>
                <span class="eyebrow">Catalogue</span>
                <h1>Choisissez le prochain cours.</h1>
                <p>Filtrez rapidement les formations et reprenez un parcours adapté à votre niveau.</p>
            </div>
            <div class="catalogue-summary">
                <strong>Recherche rapide</strong>
                <span>Résultats mis à jour instantanément.</span>
            </div>
        </header>

        <section class="filter-panel" aria-label="Filtres du catalogue">
            <label class="field-shell" for="course-search">
                <span>Recherche</span>
                <input id="course-search" type="search" placeholder="Rechercher un cours..." class="input">
            </label>
            <label class="field-shell" for="course-level">
                <span>Niveau</span>
                <select id="course-level" class="input">
                    <option value="">Tous les niveaux</option>
                    <option value="DEBUTANT">Débutant</option>
                    <option value="INTERMEDIAIRE">Intermédiaire</option>
                    <option value="AVANCE">Avancé</option>
                </select>
            </label>
        </section>

        <section id="courses-root" class="catalogue-grid"></section>
    </main>

    <script type="module" th:src="@{/js/app/coursesPage.js}"></script>
</body>
</html>
