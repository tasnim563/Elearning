<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - e-learn Fst</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
    <style>
        .modern-inscription {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 480px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        .card h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
            margin: 0 0 12px;
        }
        
        .card p {
            color: #718096;
            margin: 0 0 30px;
            font-size: 1rem;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .btn-outline {
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid #667eea;
            border-radius: 8px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        
        .btn-outline:hover {
            background: #667eea;
            color: white;
        }
        
        .course-tag {
            display: inline-block;
            padding: 6px 14px;
            background: #e0e7ff;
            color: #3730a3;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
    </style>
</head>
<body class="modern-inscription">
    <div class="card">
        <div class="course-tag">Inscription</div>
        <h1 th:text="${cours != null ? cours.titre : 'Rejoindre ce cours'}">Rejoindre ce cours</h1>
        <p>Un clic et vous ajoutez ce cours a votre parcours d'apprentissage.</p>
        
        <form th:action="@{/inscrire}" method="post">
            <input type="hidden" name="cours.id" th:value="${cours.id}"/>
            <button class="btn-primary" type="submit">S'inscrire maintenant</button>
        </form>
        
        <a class="btn-outline" th:href="@{/catalogue}">Retour au catalogue</a>
    </div>
    <script type="module" th:src="@{/js/app/ambient.js}"></script>
</body>
</html>
