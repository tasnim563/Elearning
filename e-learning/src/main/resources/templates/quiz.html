<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - e-learn Fst</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/site.css}">
    <link rel="stylesheet" th:href="@{/css/quiz-interface.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Quiz Container -->
    <div class="quiz-container">
        <div class="quiz-wrapper">
            <!-- Quiz Header -->
            <div class="quiz-header">
                <span class="quiz-badge">🧠 Quiz</span>
                <h1 class="quiz-title" th:text="${quiz.titre}">Quiz Title</h1>
                <p class="quiz-subtitle">Testez vos connaissances et validez votre progression</p>
            </div>
            
            <!-- Progress Indicator -->
            <div class="quiz-progress">
                <div class="progress-dots">
                    <div class="progress-dot completed"></div>
                    <div class="progress-dot completed"></div>
                    <div class="progress-dot current"></div>
                    <div class="progress-dot"></div>
                    <div class="progress-dot"></div>
                </div>
                <span class="progress-text" th:text="${#lists.size(quiz.questions)} + ' questions'">5 questions</span>
            </div>
            
            <!-- Quiz Form -->
            <form class="quiz-form" th:action="@{/quiz/{quizId}/soumettre(quizId=${quiz.id})}" method="post">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="question-card" th:each="q, iStat : ${quiz.questions}">
                    <div class="question-number" th:text="${'Question ' + (iStat.index + 1)}">Question 1</div>
                    <p class="question-text" th:text="${q.intitule}">Question text goes here?</p>
                    
                    <div class="answers-grid">
                        <label class="answer-card" th:each="choix, i : ${q.choix}">
                            <input type="radio" th:name="'reponses[' + ${iStat.index} + ']'" th:value="${i}" required style="display: none;" />
                            <div class="answer-card-content">
                                <div class="answer-radio"></div>
                                <span class="answer-text" th:text="${choix}">Answer choice</span>
                            </div>
                        </label>
                    </div>
                </div>
                
                <!-- Quiz Controls -->
                <div class="quiz-controls">
                    <a href="/catalogue" class="btn-quiz btn-quiz-secondary">Annuler</a>
                    <button type="submit" class="btn-quiz btn-quiz-primary">Soumettre mes réponses</button>
                </div>
            </form>
        </div>
    </div>
    
    <script th:src="@{/js/quiz-interactions.js}"></script>
</body>
</html>
