<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - e-learn Fst</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
    <style>
        .modern-quiz {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            color: white;
        }
        
        .modern-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .header-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.4rem;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .btn-outline {
            padding: 10px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            background: transparent;
            cursor: pointer;
            font-size: 0.95rem;
        }
        
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .quiz-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .quiz-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 12px;
        }
        
        .quiz-header p {
            color: rgba(255, 255, 255, 0.7);
            margin: 0;
            font-size: 1.1rem;
        }
        
        .quiz-form {
            display: grid;
            gap: 30px;
        }
        
        .question-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 30px;
        }
        
        .question-number {
            display: inline-block;
            padding: 6px 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .question-card h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0 0 24px;
        }
        
        .choices-list {
            display: grid;
            gap: 12px;
        }
        
        .choice-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .choice-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(102, 126, 234, 0.5);
        }
        
        .choice-item input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #667eea;
            cursor: pointer;
        }
        
        .choice-item span {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        @media (max-width: 768px) {
            .main-container { padding: 20px 15px; }
            .question-card { padding: 20px; }
        }
    </style>
</head>
<body class="modern-quiz">
    <header class="modern-header">
        <div class="header-container">
            <a href="/" class="logo">
                <div class="logo-icon">📚</div>
                <span>e-learn Fst</span>
            </a>
            <a href="/catalogue" class="btn-outline">Retour au catalogue</a>
        </div>
    </header>
    
    <div class="main-container">
        <div class="quiz-header">
            <h1>Quiz</h1>
            <p>Testez vos connaissances et validez votre progression.</p>
        </div>
        
        <form class="quiz-form" th:action="@{/quiz/{quizId}/soumettre(quizId=${quiz.id})}" method="post">
            <div class="question-card" th:each="q, iStat : ${quiz.questions}">
                <div class="question-number" th:text="${'Question ' + (iStat.index + 1) + '/' + #lists.size(quiz.questions)}">Question 1/3</div>
                <h2 th:text="${q.intitule}">Intitule</h2>
                <div class="choices-list">
                    <label class="choice-item" th:each="choix, i : ${q.choix}">
                        <input type="radio" th:name="'reponses[' + ${iStat.index} + ']'" th:value="${i}" required />
                        <span th:text="${choix}">Choix</span>
                    </label>
                </div>
            </div>
            
            <button class="btn-submit" type="submit">Soumettre mes reponses</button>
        </form>
    </div>
</body>
</html>
