<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat Quiz - e-learn Fst</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/site.css}">
    <link rel="stylesheet" th:href="@{/css/quiz-interface.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .result-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: bounce 1s ease infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .result-score {
            font-size: 4rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 1rem 0;
        }
        
        .result-message {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        
        .result-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    
    <!-- Result Container -->
    <div class="quiz-container">
        <div class="quiz-wrapper" style="text-align: center;">
            <!-- Result Icon -->
            <div class="result-icon" th:if="${score >= 80}">🎉</div>
            <div class="result-icon" th:if="${score >= 50 and score < 80}">👍</div>
            <div class="result-icon" th:if="${score < 50}">💪</div>
            
            <!-- Result Title -->
            <h1 class="quiz-title">Quiz terminé !</h1>
            
            <!-- Score Display -->
            <div class="result-score" th:text="${score} + '%'">80%</div>
            
            <!-- Result Message -->
            <p class="result-message" th:if="${score >= 80}">Excellent travail ! Vous maîtrisez ce sujet.</p>
            <p class="result-message" th:if="${score >= 50 and score < 80}">Bon effort ! Encore un peu de pratique et vous serez parfait.</p>
            <p class="result-message" th:if="${score < 50}">Continuez à apprendre ! Revisitez les leçons et réessayez.</p>
            
            <!-- Actions -->
            <div class="result-actions">
                <a th:href="@{/catalogue}" class="btn-futuristic">Retour au catalogue</a>
                <a th:href="@{/progression}" class="btn-outline-neon">Ma progression</a>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/futuristic-interactions.js}"></script>
</body>
</html>
