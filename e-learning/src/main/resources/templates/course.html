<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course - e-learn Fst</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/site.css}">
    <link rel="stylesheet" th:href="@{/css/reviews.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-header" id="navbar">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between; height: 100%;">
            <a href="/" style="display: flex; align-items: center; gap: 0.75rem; text-decoration: none;">
                <div style="width: 40px; height: 40px; background: var(--gradient-primary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: white;">📚</div>
                <span style="font-size: 1.5rem; font-weight: var(--font-weight-bold); background: var(--gradient-primary); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">e-learn Fst</span>
            </a>
            
            <ul style="display: flex; gap: 2rem; list-style: none; margin: 0;">
                <li><a href="/" class="nav-link">Accueil</a></li>
                <li><a href="/catalogue" class="nav-link">Catalogue</a></li>
                <li><a href="/progression" class="nav-link">My Learning</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a href="/admin" class="nav-link">Admin</a></li>
                <li sec:authorize="hasRole('FORMATEUR')"><a href="/manager" class="nav-link">Manager</a></li>
            </ul>
            
            <div style="display: flex; gap: 1rem;">
                <a href="/login" class="btn btn-primary" sec:authorize="!isAuthenticated()">Sign In</a>
                <form th:action="@{/logout}" method="post" style="margin: 0;" sec:authorize="isAuthenticated()">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-secondary">Déconnexion</button>
                </form>
            </div>
        </div>
    </nav>
    
    <!-- Course Content -->
    <div class="container" style="max-width: 1400px; margin: 0 auto; padding: 8rem 1rem 4rem;">
        <div class="grid grid-cols-1 lg:grid-cols-4" style="gap: var(--spacing-lg);">
            <div id="course-root" style="grid-column: span 3;"></div>
            <aside class="card" style="padding: var(--spacing-lg); border-radius: var(--radius-xl); height: fit-content; position: sticky; top: 100px;">
                <div id="lesson-nav"></div>
                
                <!-- Certificate Section -->
                <div id="certificate-section" class="certificate-section" style="display: none; margin-top: var(--spacing-lg);">
                    <h3>🎓 Félicitations !</h3>
                    <p>Vous avez complété ce cours à 100%</p>
                    <a id="certificate-download" href="#" class="certificate-button">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        Télécharger le certificat
                    </a>
                </div>
            </aside>
        </div>
        
        <!-- Reviews Section -->
        <div id="reviews-section" class="reviews-section">
            <div class="reviews-header">
                <h2>Avis et notes</h2>
                <div class="rating-summary">
                    <span id="average-rating" class="average-rating">0.0</span>
                    <div id="star-rating-display" class="star-rating">
                        <span class="star">★</span>
                        <span class="star">★</span>
                        <span class="star">★</span>
                        <span class="star">★</span>
                        <span class="star">★</span>
                    </div>
                    <span id="total-reviews" class="total-reviews">(0 avis)</span>
                </div>
            </div>
            
            <!-- Review Form -->
            <div id="review-form-container" class="review-form" sec:authorize="isAuthenticated()">
                <h3>Laisser un avis</h3>
                <div class="star-input" id="star-input">
                    <button type="button" data-rating="1">★</button>
                    <button type="button" data-rating="2">★</button>
                    <button type="button" data-rating="3">★</button>
                    <button type="button" data-rating="4">★</button>
                    <button type="button" data-rating="5">★</button>
                </div>
                <textarea id="review-comment" placeholder="Partagez votre expérience avec ce cours..."></textarea>
                <div class="review-form-actions">
                    <button id="submit-review" class="btn btn-primary">Envoyer mon avis</button>
                </div>
            </div>
            
            <!-- Reviews List -->
            <div id="reviews-list" class="reviews-list">
                <!-- Reviews will be loaded dynamically -->
            </div>
        </div>
    </div>
    <style>
        @media (max-width: 1024px) {
            .grid.lg\:grid-cols-4 { grid-template-columns: 1fr !important; }
            aside { position: static !important; }
        }
    </style>
    
    <script type="module" th:src="@{/js/app/coursePage.js}"></script>
    <script th:inline="javascript">
        window.__COURSE_ID__ = /*[[${courseId}]]*/ 0;
        window.__CSRF__ = {
            parameterName: /*[[${_csrf != null ? _csrf.parameterName : ''}]]*/ '',
            token: /*[[${_csrf != null ? _csrf.token : ''}]]*/ ''
        };
    </script>
</body>
</html>
