<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Spring Boot Course Cover</title>
  <desc id="desc">Abstract orange and dark cover for a Java Spring Boot course.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1e2b"/>
      <stop offset="100%" stop-color="#4d2619"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f39b61"/>
      <stop offset="100%" stop-color="#cf6b3d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="220" cy="170" r="160" fill="#ffffff" fill-opacity="0.06"/>
  <circle cx="1020" cy="660" r="220" fill="#ffffff" fill-opacity="0.05"/>
  <rect x="120" y="120" width="420" height="12" rx="6" fill="url(#accent)"/>
  <rect x="120" y="168" width="540" height="148" rx="30" fill="#fffaf4" fill-opacity="0.95"/>
  <text x="158" y="226" fill="#1a1e2b" font-size="58" font-family="Georgia, serif" font-weight="700">Java Spring Boot</text>
  <text x="158" y="278" fill="#6e6254" font-size="28" font-family="Trebuchet MS, sans-serif">Backend, MVC, data and deployment flow</text>
  <rect x="120" y="420" width="360" height="200" rx="36" fill="#fffaf4" fill-opacity="0.08" stroke="#fffaf4" stroke-opacity="0.16"/>
  <rect x="540" y="420" width="520" height="200" rx="36" fill="#cf6b3d"/>
  <text x="600" y="508" fill="#fffaf4" font-size="34" font-family="Trebuchet MS, sans-serif">Build interfaces, connect data, ship faster</text>
  <text x="600" y="560" fill="#fffaf4" font-size="22" font-family="Trebuchet MS, sans-serif" opacity="0.84">A practical course card image stored locally in the app.</text>
</svg>
